<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCM Digital Archive | Research Library</title>
    
    <!-- Netlify Identity for CMS Login -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <!-- Fuse.js for Fuzzy Search -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>

    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+Pro:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        canalBlue: '#1a365d',
                        brickDust: '#9c4221',
                        parchment: '#fdfbf7',
                        ink: '#1a1a1a',
                    },
                    fontFamily: {
                        serif: ['"Libre Baskerville"', 'serif'],
                        sans: ['"Source Sans Pro"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .ledger-border { border: 1px solid rgba(26, 54, 93, 0.1); }
        .bg-grain { background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); }
        .modal-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1); }
        .card-hover:hover { border-color: #9c4221; transform: translateY(-2px); transition: all 0.2s ease; }
    </style>
</head>
<body class="bg-parchment bg-grain text-ink font-sans min-h-screen">

    <!-- NAVIGATION -->
    <nav class="border-b-2 border-canalBlue p-6 bg-white/50 backdrop-blur-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="font-serif text-2xl font-bold text-canalBlue tracking-tight">Brockport Community Museum</h1>
            <div class="hidden md:flex space-x-8 font-serif italic text-sm">
                <a href="#" class="hover:text-brickDust">About</a>
                <a href="#" class="hover:text-brickDust">Visit & Explore</a>
                <a href="#" class="underline decoration-brickDust text-brickDust">Research Library</a>
                <a href="#" class="hover:text-brickDust border border-canalBlue px-4 py-2 not-italic">Join Us</a>
            </div>
        </div>
    </nav>

    <header class="max-w-4xl mx-auto pt-16 pb-8 text-center px-4">
        <span class="text-brickDust font-serif italic uppercase tracking-widest text-xs">AI-Enhanced Research Portal</span>
        <h2 class="font-serif text-4xl md:text-5xl mt-4 mb-6 text-canalBlue">The Research Library</h2>
        <div class="h-1 w-24 bg-brickDust mx-auto mb-8"></div>
    </header>

    <!-- SEARCH & FILTERS -->
    <main class="max-w-6xl mx-auto px-4 pb-24">
        
        <div class="bg-white border border-gray-200 p-6 mb-12 shadow-sm">
            <div class="flex flex-col md:flex-row gap-6 items-end">
                <div class="flex-grow">
                    <label class="font-serif italic text-sm block mb-2 text-canalBlue">Search Archive (e.g. "Canal receipts", "Civil War soldiers")</label>
                    <input type="text" id="searchInput" placeholder="Search by keyword, person, or date..." 
                           class="w-full p-3 border-b-2 border-canalBlue bg-parchment focus:outline-none focus:border-brickDust font-serif text-lg">
                </div>
                <div class="flex gap-2">
                    <select id="catFilter" class="p-3 bg-white border border-gray-300 font-serif text-sm focus:outline-none">
                        <option value="All">All Categories</option>
                        <option value="Exhibits">Exhibits</option>
                        <option value="Panels">Interpretive Panels</option>
                        <option value="Admin">Administrative</option>
                    </select>
                </div>
            </div>
            <div id="searchStats" class="mt-4 text-[10px] uppercase tracking-widest text-gray-400 font-bold">
                Showing all records
            </div>
        </div>

        <!-- DOCUMENT GRID -->
        <div id="documentGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Cards Injected by JS -->
        </div>
    </main>

    <!-- MODAL FOR PREVIEW -->
    <div id="previewModal" class="hidden fixed inset-0 bg-canalBlue/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-parchment max-w-2xl w-full p-8 border-t-8 border-brickDust modal-shadow relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-canalBlue text-2xl font-bold">&times;</button>
            <h3 id="modalTitle" class="font-serif text-2xl text-canalBlue mb-4"></h3>
            <p id="modalBody" class="text-gray-700 leading-relaxed mb-8 italic"></p>
            <div id="modalKeywords" class="mb-8 flex flex-wrap gap-2"></div>
            <a id="modalLink" href="#" target="_blank" class="inline-block bg-canalBlue text-white font-serif px-6 py-3 hover:bg-brickDust transition">Download Full PDF</a>
        </div>
    </div>

    <script>
let documents = [];
let fuse;

async function loadData() {
    try {
        const response = await fetch('data.json');
        const data = await response.json();
        documents = data.documents;

        // Initialize Fuzzy Search Engine
        fuse = new Fuse(documents, {
            keys: [
                { name: 'title', weight: 1.0 },
                { name: 'summary', weight: 0.7 },
                { name: 'keywords', weight: 0.5 },
                { name: 'cat', weight: 0.3 }
            ],
            threshold: 0.3,
            ignoreLocation: true
        });

        renderGrid(documents);
    } catch (error) {
        console.error("Error loading archive:", error);
    }
}

function renderGrid(data) {
    const grid = document.getElementById('documentGrid');
    const stats = document.getElementById('searchStats');
    
    stats.innerText = `Showing ${data.length} records`;

    grid.innerHTML = data.map((doc, index) => `
        <div class="bg-white p-6 ledger-border card-hover relative flex flex-col justify-between">
            <div>
                <div class="flex justify-between items-start mb-4">
                    <span class="text-[10px] uppercase tracking-widest border border-gray-200 px-2 py-1 bg-parchment text-gray-500">
                        ${doc.cat}
                    </span>
                    <a href="archive/${doc.file}" target="_blank" class="text-canalBlue hover:text-brickDust transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                    </a>
                </div>
                <h3 class="font-serif text-xl text-canalBlue font-bold mb-3 cursor-pointer hover:underline" onclick="openPreview('${doc.file}')">
                    ${doc.title}
                </h3>
                <p class="text-sm text-gray-600 leading-relaxed italic line-clamp-3 mb-4">
                    ${doc.summary || 'No summary available for this document.'}
                </p>
            </div>
            <div class="mt-4 pt-4 border-t border-gray-100">
                <div class="text-[9px] uppercase tracking-tighter text-gray-400 font-bold mb-2">Key Topics</div>
                <div class="flex flex-wrap gap-1">
                    ${(doc.keywords || "").split(',').slice(0, 3).map(tag => `
                        <span class="bg-gray-50 text-gray-500 px-2 py-0.5 text-[9px] rounded-sm border border-gray-100">${tag.trim()}</span>
                    `).join('')}
                </div>
            </div>
        </div>
    `).join('');
}

function updateView() {
    const term = document.getElementById('searchInput').value;
    const cat = document.getElementById('catFilter').value;
    
    let results = term ? fuse.search(term).map(r => r.item) : documents;

    const filtered = results.filter(doc => {
        return cat === 'All' || doc.cat === cat;
    });

    renderGrid(filtered);
}

document.getElementById('searchInput').addEventListener('input', updateView);
document.getElementById('catFilter').addEventListener('change', updateView);

function openPreview(fileName) {
    const doc = documents.find(d => d.file === fileName);
    if (!doc) return;

    document.getElementById('modalTitle').innerText = doc.title;
    document.getElementById('modalBody').innerText = doc.summary || "No summary available.";
    document.getElementById('modalLink').href = 'archive/' + doc.file;
    
    const kwBox = document.getElementById('modalKeywords');
    kwBox.innerHTML = (doc.keywords || "").split(',').map(tag => `
        <span class="bg-canalBlue/5 text-canalBlue px-3 py-1 text-[10px] uppercase font-bold tracking-widest border border-canalBlue/10">
            ${tag.trim()}
        </span>
    `).join('');

    document.getElementById('previewModal').classList.remove('hidden');
}

function closeModal() {
    document.getElementById('previewModal').classList.add('hidden');
}

// Redirect logic for Netlify Identity
if (window.netlifyIdentity) {
  window.netlifyIdentity.on("init", user => {
    if (!user) {
      window.netlifyIdentity.on("login", () => {
        document.location.href = "/admin/";
      });
    }
  });
}

loadData();
    </script>
</body>
</html>
